  <style>
    /* Inlined docs route-result contract for the app-local prototype server. */
    .route-options{display:flex;align-items:center;gap:8px;margin:-4px 0 10px;overflow-x:auto;overflow-y:hidden;padding:6px 0 10px;border-bottom:1px solid var(--line);background:#fff;scrollbar-width:none;overscroll-behavior-x:contain;touch-action:pan-x pan-y;}
    .route-options::-webkit-scrollbar{display:none;}
    .route-option-button{display:inline-grid;grid-template-columns:0 minmax(0,1fr);align-items:center;flex:0 0 auto;gap:0;min-height:38px;border:1px solid var(--line);border-radius:999px;padding:7px 12px;background:#fff;color:var(--muted);font-size:.86rem;font-weight:700;line-height:1.25;text-align:left;white-space:nowrap;}
    .route-option-button:hover{background:#edf7f4;}
    .route-option-button.is-active{grid-template-columns:18px minmax(0,1fr);gap:5px;border-color:var(--teal);background:#e4f3ef;color:var(--teal-dark);box-shadow:inset 0 0 0 1px var(--teal);}
    .route-option-button small{display:block;margin-top:1px;color:inherit;font-size:.68rem;font-weight:500;}
    .route-option-check{width:18px;height:18px;overflow:hidden;opacity:0;fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
    .route-option-button.is-active .route-option-check{opacity:1;}
    .summary-band{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:8px;align-items:stretch;margin:4px 0 14px;}
    .summary-band>div{min-width:0;border:1px solid var(--line);border-radius:12px;background:var(--surface-soft);padding:10px;}
    .summary-band>.summary-travel-card{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;}
    .summary-band .summary-metric{display:flex;min-width:0;flex-direction:column;justify-content:center;padding:0;border:0;border-radius:0;background:transparent;}
    .summary-band .summary-metric+.summary-metric{margin-left:12px;padding-left:12px;border-left:1px solid var(--line);}
    .summary-band>.summary-fare-card{display:flex;flex-direction:column;justify-content:center;}
    .summary-band span,.summary-band strong{display:block;min-width:0;}
    .summary-band span{color:var(--muted);font-size:.76rem;font-weight:600;}
    .summary-band strong{margin-top:4px;overflow-wrap:anywhere;font-size:.98rem;}
    .journey-section{margin:0 0 18px;border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden;}
    .journey-heading{margin:0;padding:12px 16px 6px;color:var(--ink);font-size:1.08rem;font-weight:900;}
    .journey-flow{display:grid;padding:4px 0;}
    .journey-empty{padding:14px 16px;color:var(--muted);font-size:1rem;font-weight:700;}
    .journey-item{display:grid;grid-template-columns:56px 28px minmax(0,1fr);width:100%;min-height:76px;padding:10px 14px 10px 16px;border:0;border-radius:6px;background:transparent;color:inherit;font:inherit;text-align:left;cursor:default;}
    .journey-item.is-expandable{cursor:pointer;}
    .journey-item:not(.is-expandable):hover{background:transparent;}
    .journey-item.is-expandable:hover{background:#f7f9f8;}
    .journey-time{padding-top:2px;color:var(--ink);font-size:.98rem;font-weight:900;white-space:nowrap;}
    .journey-line{position:relative;display:flex;justify-content:center;}
    .journey-line:before{content:"";position:absolute;top:16px;bottom:-20px;width:5px;border-radius:999px;background:var(--route-color,#1d9bf0);}
    .journey-item.is-walk .journey-line:before{width:6px;border:0;border-radius:0;background:radial-gradient(circle at center,var(--route-color,#1d9bf0) 0 3px,transparent 3.25px) center top/6px 14px repeat-y;}
    .journey-line>span{position:relative;z-index:1;width:18px;height:18px;border:3px solid #232b2b;border-radius:999px;background:#fff;}
    .journey-item.is-final{padding-bottom:14px;}
    .journey-item.is-final .journey-line:before{bottom:34px;}
    .journey-leg{min-width:0;padding:0 0 14px 4px;border-bottom:1px solid var(--line);}
    .journey-item:last-child .journey-leg{border-bottom:0;}
    .journey-title{display:flex;align-items:center;gap:8px;min-width:0;color:var(--ink);font-size:1.08rem;font-weight:900;line-height:1.28;}
    .journey-title>span:not(.journey-step-number):not(.journey-route-badge){min-width:0;overflow-wrap:anywhere;}
    .journey-step-number{display:inline-grid;place-items:center;min-width:25px;height:25px;border:2px solid currentColor;border-radius:50%;font-size:.78rem;line-height:1;}
    .journey-route-badge{display:inline-flex;align-items:center;flex:0 0 auto;min-height:28px;padding:3px 8px;border:2px solid var(--route-color,#1d9bf0);border-radius:4px;background:var(--route-color,#1d9bf0);color:#fff;font-size:.98rem;font-weight:900;line-height:1;}
    .journey-item.is-bus .journey-route-badge{background:#fff;color:#171717;}
    .journey-meta{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:7px;color:var(--muted);font-size:.98rem;font-weight:700;line-height:1.35;}
    .journey-meta-detail{flex:0 0 100%;}
    .journey-stop{display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;margin-top:10px;color:var(--ink);font-size:1.18rem;font-weight:900;line-height:1.3;}
    .journey-stop>span{color:var(--muted);font-size:.9rem;font-weight:600;}
    .journey-mtr-exit{display:inline-flex;align-items:center;gap:6px;margin-left:5px;color:var(--ink);line-height:1;white-space:nowrap;}
    .journey-exit-icon{width:27px;height:27px;object-fit:contain;}
    .journey-exit-instruction{color:var(--ink);font-size:1.05rem;font-weight:800;line-height:1;}
    .journey-transit-stops{margin-top:12px;padding-top:11px;border-top:1px solid var(--line);animation:journey-stops-in 240ms ease;}
    .journey-transit-stops-heading{display:flex;align-items:baseline;justify-content:space-between;gap:10px;color:var(--ink);}
    .journey-transit-stops-heading strong{font-size:.96rem;font-weight:800;}
    .journey-transit-stops-heading span{color:var(--muted);font-size:.8rem;font-weight:500;}
    .journey-transit-stops ol{display:grid;gap:0;margin:9px 0 0;padding:0;list-style:none;}
    .journey-transit-stops li{position:relative;display:grid;min-height:36px;grid-template-columns:16px minmax(0,1fr) auto;align-items:start;gap:8px;padding-bottom:8px;color:var(--ink);}
    .journey-transit-stops li:not(:last-child):after{content:"";position:absolute;z-index:0;top:10px;bottom:-10px;left:5px;width:2px;background:var(--line);}
    .journey-stop-marker{position:relative;z-index:1;display:block;width:12px;height:12px;margin-top:4px;border:2px solid var(--route-color,var(--teal));border-radius:50%;background:#fff;}
    .journey-stop-name{padding-top:0;overflow-wrap:anywhere;font-size:.9rem;font-weight:500;line-height:1.35;}
    .journey-transit-stops small{margin-top:0;padding:2px 6px;border:1px solid var(--line);border-radius:999px;color:var(--teal-dark);font-size:.72rem;font-weight:500;line-height:1.35;}
    .journey-transit-stops .is-boarding .journey-stop-marker,.journey-transit-stops .is-alighting .journey-stop-marker{background:var(--route-color,var(--teal));}
    .journey-stops-summary{display:inline-flex;align-items:center;gap:3px;color:var(--teal-dark);font-weight:700;}
    .journey-stops-summary svg{width:17px;height:17px;flex:0 0 auto;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
    .journey-end-marker{position:absolute;z-index:2;bottom:1px;width:30px;height:30px;padding:3px;border-radius:50%;background:#fff;color:#df2d2d;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;stroke-width:2.2;filter:drop-shadow(0 2px 3px rgba(81,20,20,.22));}
    @keyframes journey-stops-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:900px){.summary-band{grid-template-columns:1fr}.journey-item{grid-template-columns:48px 24px minmax(0,1fr);min-height:68px;padding:9px 10px 9px 16px}.journey-time,.journey-meta{font-size:.9rem}.journey-title{font-size:1rem}}
  </style>
  <style>
    .summary>.route-title{order:0;}
    .summary>.route-options{order:1;}
    .summary>.summary-band{order:2;}

    .summary>.evidence{order:5;}

  <style>
    /* Final docs-aligned controls and interaction overrides. */
    input[type="search"]::-webkit-search-cancel-button,input[type="search"]::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none;}
    input[type="search"]::-ms-clear,input[type="search"]::-ms-reveal{display:none;width:0;height:0;}
    .primary{font-size:1rem;}
    .primary.is-ai-ready{border-color:transparent;background:linear-gradient(25deg,#4da649 0%,#0171c0 100%);}
    .primary.is-ai-ready:hover{background:linear-gradient(25deg,#4da649 0%,#0171c0 100%);filter:brightness(.96);}
    :focus-visible{outline:0;box-shadow:none;}
    input:focus,select:focus,.api input:focus{outline:0;border-color:#9aa9a4;box-shadow:none;}
    button:focus-visible{outline:0;box-shadow:none;}
    .form-panel{align-self:start;height:auto;max-height:none;overflow:visible;}
    .profile-strip{container-type:inline-size;display:grid;grid-template-columns:repeat(4,minmax(0,1fr)) minmax(0,1.26fr) minmax(0,1fr);gap:1.047%;margin:4px 0 14px;}
    .profile-button{min-width:0;min-height:10.47cqw;border-width:.262cqw;border-radius:999px;padding:1.57cqw 2.09cqw;background:#fff;color:var(--muted);font-size:4.82cqw;font-weight:800;line-height:1;white-space:nowrap;}
    .profile-button.is-active{border-color:var(--teal);background:#e4f3ef;color:var(--teal-dark);}
    .workspace.is-empty-results .results{display:flex;flex-direction:column;}
    .workspace.is-empty-results .results .result-body{display:flex;flex:1;flex-direction:column;}
    .workspace.is-empty-results .summary.visible{display:flex;flex:1;flex-direction:column;}
    .workspace.is-empty-results .journey-section{display:flex;flex:1;flex-direction:column;}
    .workspace.is-empty-results .journey-heading{order:0;padding-left:16px;}
    .workspace.is-empty-results .journey-flow{order:1;flex:1;align-content:start;}
    .field .profile-strip+.help{margin-top:2px;}
    .search-line{display:grid;grid-template-columns:minmax(0,1fr);position:relative;}
    .search-line input{min-height:54px;padding:12px 42px 12px 14px;border-radius:12px;background:var(--surface-soft);font-size:1.08rem;}
    .search-clear-button{position:absolute;right:8px;top:50%;display:grid;place-items:center;width:30px;height:30px;transform:translateY(-50%);border:0;border-radius:50%;background:transparent;color:var(--muted);}
    .search-clear-button[hidden]{display:none !important;}
    .search-clear-button svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
    .search-results{display:grid;grid-template-rows:0fr;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:900;overflow:hidden;border:1px solid transparent;border-radius:12px;background:transparent;box-shadow:none;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.985);transform-origin:top center;visibility:hidden;transition:grid-template-rows 300ms cubic-bezier(.2,.8,.2,1),opacity 180ms ease,transform 300ms cubic-bezier(.2,.8,.2,1),border-color 120ms ease,background-color 120ms ease,box-shadow 180ms ease,visibility 0s linear 300ms;}
    .search-results.is-open{grid-template-rows:1fr;border-color:var(--line);background:#fff;box-shadow:var(--shadow);opacity:1;pointer-events:auto;transform:translateY(0) scale(1);visibility:visible;transition-delay:0s;}
    .search-results-frame{display:flex;min-height:0;flex-direction:column;overflow:hidden;border-radius:inherit;background:#fff;}
    .search-results-scroll{min-height:0;flex:1 1 auto;max-height:210px;overflow-x:hidden;overflow-y:auto;overscroll-behavior:contain;scrollbar-gutter:stable;}
    .search-results-scroll:empty{display:none;}
    .search-status-card{position:relative;z-index:1;flex:0 0 auto;border-top:1px solid var(--line);background:#fff;box-shadow:0 -8px 14px rgba(16,24,20,.08);}
    .search-option{display:block;width:100%;min-height:48px;border:0;border-radius:0;padding:8px 12px;background:#fff;color:var(--ink);text-align:left;}
    .search-option:hover,.search-option:focus-visible{background:#edf7f4;}
    .search-option strong,.search-option span{display:block;overflow-wrap:anywhere;line-height:1.35;}
    .search-option span{color:var(--muted);font-size:.82rem;}
    .api{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
    .api-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--teal-dark);font-size:.78rem;font-weight:900;}
    .api-status{min-height:18px;color:#a16f00;font-size:.68rem;font-weight:800;text-align:right;}
    .api-status.is-success{color:#19724d;}.api-status.is-error{color:#ae3d2a;}
    .api-fields{display:grid;gap:9px;padding-top:12px;}
    .api-fields label{color:var(--muted);font-size:.72rem;font-weight:800;}
    .api-fields input{margin-top:4px;padding:9px 10px;border-radius:9px;font-size:.78rem;}
    .api .warning{margin:9px 0 0;color:#8d5b33;font-size:.68rem;line-height:1.45;}
    .summary>.route-options{min-height:50px;}
    .summary>.route-options:empty{min-height:0;border-bottom-color:transparent;padding:0;margin:0;}
    .skeleton-route{height:42px;min-width:112px;border:1px solid #d5dfda;border-radius:999px;background:linear-gradient(100deg,#f0f4f2 20%,#fff 40%,#f0f4f2 60%);background-size:220% 100%;animation:skeleton-shimmer 1.15s ease-in-out infinite;}
    .skeleton-row{height:64px;margin:4px 16px;border-radius:10px;background:linear-gradient(100deg,#f1f5f3 20%,#fff 40%,#f1f5f3 60%);background-size:220% 100%;animation:skeleton-shimmer 1.15s ease-in-out infinite;}
    .ai-box.is-thinking{background:linear-gradient(25deg,#4da649 0%,#0171c0 100%);background-size:260% 260%;animation:ai-theme-scroll 2.6s ease-in-out infinite;}
    .ai-box:not(.is-thinking) .placeholder{color:var(--muted);}
    @keyframes skeleton-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .journey-time{display:grid;grid-template-columns:max-content max-content;justify-content:start;align-content:start;column-gap:0;row-gap:2px;justify-items:stretch;min-width:0;}
    .journey-time-row{display:contents;}
    .journey-time-number{text-align:left;}
    .journey-time-unit{text-align:right;}
    .journey-time-now{display:block;grid-column:1/-1;text-align:left;white-space:nowrap;}
    .journey-line{align-self:stretch;min-height:76px;}
    .journey-line:before{bottom:-32px;}
    .journey-item.is-final .journey-line:before{bottom:34px;}
    .journey-end-marker{left:50%;transform:translateX(-50%);bottom:1px;}
    .journey-item.is-final .journey-line.is-terminal-aligned:before{bottom:auto;height:var(--journey-final-line-height,0px);}
    .journey-line.is-terminal-aligned .journey-end-marker{top:var(--journey-end-center);bottom:auto;transform:translate(-50%,-50%);}
    .journey-stop strong{font-size:1.18rem;font-weight:900;}
    .journey-mtr-exit{display:inline-flex;flex:0 0 max-content;width:max-content;min-width:max-content;max-width:none;white-space:nowrap!important;}
    .journey-exit-instruction{display:inline-block;flex:0 0 auto;width:max-content;max-width:none;white-space:nowrap!important;}
    .journey-exit-code{display:inline!important;white-space:nowrap;}
    .empty[hidden]{display:none !important;}
    .ai-content h3,.ai-content h4,.ai-content h5{margin:8px 0 5px;color:inherit;font-size:1em;font-weight:900;}
    .ai-content ul,.ai-content ol{margin:6px 0;padding-left:20px;}
    .ai-content code{padding:1px 4px;border-radius:4px;background:rgba(0,0,0,.08);font-family:Consolas,monospace;font-size:.9em;}
    @media(max-width:900px){.form-panel{height:auto;max-height:none;overflow:visible;}.profile-strip{width:min(100%,410px);margin-left:0;margin-right:auto;}.journey-line{min-height:68px;}.journey-line:before{bottom:-26px;}}
    @media(prefers-reduced-motion:reduce){.skeleton-route,.skeleton-row,.ai-box.is-thinking{animation:none;}}
  </style>

  <script>
  (function(){
    "use strict";
    var state={search:null,routing:null,places:{start:null,end:null},options:[],selected:0,evidence:[],analysisByRoute:{},analysisInFlight:{},analysisEpoch:0,analysisBusy:0,busy:false,expandedSegment:null,apiConnected:false,searchChoices:{start:[],end:[]}};
    var byId=function(id){return document.getElementById(id)};
    function syncEmptyPanelHeight(){
      var form=document.querySelector(".form-panel"),results=document.querySelector(".results"),workspace=document.querySelector(".workspace"),empty=byId("routes").children.length===0;
      workspace.classList.toggle("is-empty-results",empty);results.style.minHeight=empty?Math.ceil(form.getBoundingClientRect().height)+"px":"";
    }
    function watchEmptyPanelHeight(){
      if(window.ResizeObserver)new ResizeObserver(syncEmptyPanelHeight).observe(document.querySelector(".form-panel"));
      if(window.MutationObserver)new MutationObserver(syncEmptyPanelHeight).observe(byId("routes"),{childList:true});
      window.addEventListener("resize",syncEmptyPanelHeight);requestAnimationFrame(syncEmptyPanelHeight);
    }
    var esc=function(value){return String(value==null?"":value).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]})};
    function status(text,type){byId("status").textContent=text;byId("status").className="status"+(type?" "+type:"")}
    function distance(value){var n=Number(value);return Number.isFinite(n)?(n>=1000?(n/1000).toFixed(1)+" km":Math.round(n)+" m"):"—"}
    function minutes(value){var n=Math.round(Number(value)||0);return n?n+" 分鐘":"—"}
    function fare(option){return option.fareLabel||(Number.isFinite(Number(option.fare))?"$"+Number(option.fare).toFixed(1):"車費待查")}
    function modeName(mode){return{walk:"步行",bus:"巴士",mtr:"港鐵",lightRail:"輕鐵",mixed:"混合"}[mode]||mode}
    function modes(option){return Array.from(new Set((option.segments||[]).map(function(s){return modeName(s.mode)}))).join(" · ")}
    function closeSearchMenus(){["start","end"].forEach(function(kind){var list=byId(kind+"-list"),clear=byId("clear-"+kind);if(list){list.classList.remove("is-open");list.innerHTML=""}if(clear)clear.hidden=!byId(kind).value.trim()})}
    var searchPendingTitle="\u6b63\u5728\u641c\u5c0b\u9999\u6e2f\u5730\u9ede",searchPendingDetail="\u9019\u4e00\u64cd\u4f5c\u53ef\u80fd\u6d88\u8017\u8f03\u9577\u6642\u9593\uff0c\u6b63\u5728\u540c\u6b65\u67e5\u8a62\u66f4\u591a\u5730\u9ede\uff0c\u8acb\u7a0d\u5019\u3002",searchFallback="\u9999\u6e2f";
    function searchStatusMarkup(){return'<div class="search-option search-status-card" role="status" aria-live="polite"><strong>'+searchPendingTitle+'</strong><span>'+searchPendingDetail+'</span></div>'}
    function showSuggestions(kind,items,searching){
      var list=byId(kind+"-list"),clear=byId("clear-"+kind),query=byId(kind).value.trim();state.searchChoices[kind]=items.slice();
      if(!items.length&&!searching){list.classList.remove("is-open");list.innerHTML="";if(clear)clear.hidden=!query;return}
      var buttons=items.slice(0,7).map(function(p,i){return'<button class="search-option" type="button" role="option" data-index="'+i+'"><strong>'+esc(p.name)+'</strong><span>'+esc(p.address||p.type||searchFallback)+'</span></button>'}).join("");
      var footer=searching?searchStatusMarkup():"";
      list.innerHTML='<div class="search-results-frame"><div class="search-results-scroll">'+buttons+'</div>'+footer+'</div>';
      list.classList.add("is-open");if(clear)clear.hidden=!query;
      Array.from(list.querySelectorAll("[data-index]")).forEach(function(button){button.onclick=function(){var p=items[Number(button.dataset.index)];state.places[kind]=p;byId(kind).value=p.name;closeSearchMenus();status((kind==="start"?"\u8d77\u9ede":"\u7d42\u9ede")+"\u5df2\u9078\u64c7\uff1a"+p.name,"success")}})
    }
    function wireSearch(kind){
      var input=byId(kind),timer=0,requestToken=0,clear=byId("clear-"+kind);
      function runSearch(query,token){
        if(!state.search)return;
        var local=state.search.searchLocal(query,{limit:7}),exact=state.search.hasExactLocalMatch?state.search.hasExactLocalMatch(query):false;
        showSuggestions(kind,local,!exact);
        Promise.resolve(state.search.searchRemoteAndUpdate(query,{limit:10,totalBudgetMs:4200})).then(function(enhanced){if(token!==requestToken||input.value.trim()!==query)return;showSuggestions(kind,enhanced,false)}).catch(function(){if(token===requestToken&&input.value.trim()===query)showSuggestions(kind,local,false)})
      }
      input.oninput=function(){
        state.places[kind]=null;clearTimeout(timer);var query=input.value.trim(),token=++requestToken;if(clear)clear.hidden=!query;
        if(!query){showSuggestions(kind,[],false);return}
        showSuggestions(kind,[],true);timer=setTimeout(function(){runSearch(query,token)},180)
      };
      input.onfocus=function(){var query=input.value.trim();if(!query||!state.search)return;clearTimeout(timer);var token=++requestToken;showSuggestions(kind,[],true);timer=setTimeout(function(){runSearch(query,token)},0)};
      input.onkeydown=function(event){if(event.key==="Enter"){event.preventDefault();var first=byId(kind+"-list").querySelector("[data-index]");if(first)first.click()}};
      if(clear)clear.onclick=function(){++requestToken;clearTimeout(timer);input.value="";state.places[kind]=null;showSuggestions(kind,[],false);input.focus()}
    }
    function profileValue(){return document.getElementById("profile").value}
    function setProfile(value){document.getElementById("profile").value=value;document.querySelectorAll("#profile-picker .profile-button").forEach(function(button){var active=button.dataset.profile===value;button.classList.toggle("is-active",active);button.setAttribute("aria-pressed",String(active))})}
    function pick(kind){var input=byId(kind),query=input.value.trim();if(state.places[kind]&&state.places[kind].name===query)return state.places[kind];var choices=state.searchChoices[kind]||[];if(choices.length)return choices[0];var found=state.search?state.search.searchLocal(query,{limit:1}):[];return found[0]||null}
    var apiCheckTimer=0,apiCheckToken=0;
