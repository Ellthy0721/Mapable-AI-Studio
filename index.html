      /* docs UI contract: white floating panels, teal selection, Source Han Sans / Noto Sans CJK. */
    :root {

    }
    html,body{min-height:100%;}
    body{overflow:auto;background:var(--paper);}
    button,input,select{font-family:inherit;font-weight:600;}

    .summary{display:none;flex-direction:column;gap:0;}.summary.visible{display:flex;}.route-title{padding:10px 0 8px;margin:0;}.route-title strong{font-size:.98rem;}.route-title span{font-size:.78rem;}

    /* Flat AI Studio surface: reuse docs menu controls without a floating white outer card. */

      /* AI Studio theme and state surfaces. */
    body{background:radial-gradient(circle at 8% 0,rgba(209,237,223,.9),transparent 32rem),radial-gradient(circle at 100% 25%,rgba(255,230,220,.86),transparent 30rem),var(--paper);}

    async function runWithCompleteSearch(){if(!state.dataReady){status('項目資料仍在載入，請稍候。','error');return}if(state.busy)return;if(state.analysisBusy){state.analysisEpoch+=1;state.analysisInFlight={};state.analysisBusy=0}var startQuery=byId('start').value.trim(),endQuery=byId('end').value.trim();if(!startQuery||!endQuery){status('請輸入有效的起點和終點。','error');return}state.busy=true;closeSearchMenus();byId('run').disabled=true;showLoadingResult();status('正在完成起點和終點搜尋…');try{var places=await Promise.all([resolveCompleteSearchPlace('start'),resolveCompleteSearchPlace('end')]),start=places[0],end=places[1];if(!start||!end)throw new Error('完整地點搜尋沒有找到有效的起點或終點');if(start.id===end.id)throw new Error('起點和終點不能相同');state.places.start=start;state.places.end=end;byId('start').value=start.name;byId('end').value=end.name;status('地點搜尋完成，正在調用項目路線服務…');var result=await state.routing.plan(start,end,profileValue(),{departureMode:'now',diagnostics:true});if(!result.options||!result.options.length)throw new Error('項目路線服務沒有找到可行路線');showResult(result,start,end);status('項目已找到 '+result.options.length+' 條路線。','success');if(state.apiConnected)await analyze()}catch(error){status('路線查找失敗：'+error.message,'error')}finally{state.busy=false;byId('run').disabled=!state.dataReady||state.analysisBusy>0}}
    run=runWithCompleteSearch
    var runWithSpeech=run;run=async function(){stopAiSpeech();return runWithSpeech.apply(this,arguments)}
    var runWithVoiceQuery=run;run=async function(){cancelVoiceQueryRecognition(true);return runWithVoiceQuery.apply(this,arguments)}
    var renderEvidenceWithRouteMap=renderEvidence;renderEvidence=function(){var result=renderEvidenceWithRouteMap.apply(this,arguments),option=state.options[state.selected];if(option)renderRouteMap(option,state.places.start,state.places.end);return result}
    async function init(){
      initRouteMap();wireSearch("start");wireSearch("end");state.routing=window.MapableRoutingService.create();byId("run").disabled=true;
      document.addEventListener("click",function(event){if(!event.target.closest(".input-wrap"))closeSearchMenus();if(!event.target.closest(".api-combobox"))closeApiMenus()});
      document.querySelectorAll("#profile-picker .profile-button").forEach(function(button){button.onclick=function(){setProfile(button.dataset.profile);markPlanDirty();if(state.options.length)renderEvidence()}});
      document.querySelectorAll("#ai-output-switch .ai-output-button[data-output-style]").forEach(function(button){button.onclick=function(){setAiOutputStyle(button.dataset.outputStyle)}});
      document.querySelectorAll("#ai-tone-switch .ai-output-button").forEach(function(button){button.onclick=function(){setAiTone(button.dataset.aiTone)}});
      byId("segments").addEventListener("click",function(event){var button=event.target.closest("[data-segment-index]");if(!button)return;var index=Number(button.dataset.segmentIndex),option=state.options[state.selected];setTimeout(function(){if(state.expandedSegment===index)focusRouteMapSegment(option,index);else fitRouteMap()},0)});
      byId("api-key").oninput=function(){if(state.options.length)renderEvidence();scheduleApiCheck()};wireApiMenus();
      byId("run").onclick=run;byId("analyze").onclick=function(){analyze()};updateRunButton();watchEmptyPanelHeight();window.addEventListener("resize",scheduleFinalJourneyMarkerAlignment);if(document.fonts&&document.fonts.ready)document.fonts.ready.then(scheduleFinalJourneyMarkerAlignment);
      try{var index=await window.MapableSearchService.loadIndex("data/search-index.json");state.search=window.MapableSearchService.createSearchService([],index);["start","end"].forEach(function(kind){var input=byId(kind),clear=byId("clear-"+kind),found=state.search.searchLocal(input.value.trim(),{limit:1});if(clear)clear.hidden=!input.value.trim();if(found[0])state.places[kind]=found[0]});state.dataReady=true;byId("run").disabled=state.analysisBusy>0;status("項目資料已就緒。輸入起點和終點即可開始。","success")}catch(error){state.dataReady=false;byId("run").disabled=true;status("地點索引載入失敗："+error.message,"error")}
    }

    initContextOverview()
    initAiSpeech()
    initVoiceQuery()
    init()
